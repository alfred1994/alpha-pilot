name: Test AlphaPilot

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    env:
      BROKER_MODE: paper
      ALPHAPILOT_ENV: testing
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Compile project
        run: python -m compileall -q web scheduler strategy execution data portfolio main.py config.py tests

      - name: Run deterministic regression suite
        run: |
          python tests/test_paper_account_integrity.py
          python tests/test_backtest_integrity.py
          python tests/test_technical_strategy_library.py
          python tests/test_llm_trader_integrity.py
          python tests/test_account_pnl_consistency.py
          python tests/test_intraday_replay.py
          python tests/test_web_dashboard_data.py
          python tests/test_web_public_dashboard.py
          python tests/test_agent_driver_contract.py
          python tests/test_auto_control.py
          python tests/test_auto_watchdog.py
          python tests/test_auto_doctor.py
          python tests/test_auto_trader.py
          python tests/test_paper_readiness.py
          python tests/test_paper_bootstrap.py
